server:
  port: 8080

spring:
  application:
    name: ai-sql-assistant
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/ai_sql_assistant?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  sql:
    init:
      mode: always

claude:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-5
  base-url: https://api.anthropic.com/v1/messages
  max-tokens: 512

security:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-before-deploying-anywhere}
    expiration-minutes: 60

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.aisql.assistant: INFO
